# gp_maintenance.conf - общие настройки системы автоматического обслуживания Greenplum

# Параметры подключения
export DBNAME="your_database"                # имя БД
export PGHOST="/tmp"                          # обычно сокет на мастере, или хост
export PGPORT=5432
export PGUSER="gpadmin"

# Пути
export LOG_DIR="/var/log/gp_maintenance"      # каталог для логов
export SCRIPTS_DIR="/usr/local/bin"           # каталог со скриптами (для вызова из диспетчера)

# Пороговые значения для планировщика (примеры, подстройте под свою среду)
# VACUUM FULL
export MIN_DEAD_TUPLES_FULL=100000
export MIN_DEAD_RATIO_FULL=0.2

# VACUUM (без FULL)
export MIN_DEAD_TUPLES_VACUUM=50000
export MIN_DEAD_RATIO_VACUUM=0.1

# ANALYZE – выполнять, если с последнего снимка добавилось/изменилось/удалилось больше строк
export MIN_ANALYZE_DELTA_ROWS=50000

# Таймауты в минутах для каждого типа операции
export TIMEOUT_VACUUM=60
export TIMEOUT_ANALYZE=30
export TIMEOUT_VACUUM_FULL=120

# Параллелизм – сколько обслуживающих процессов можно запустить одновременно
export MAX_PARALLEL_JOBS=2

# Дополнительные настройки psql
export PGAPPNAME="gp_maintenance"             # application_name, по нему будем узнавать свои процессы
